<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GramAlert — GRAM Tracker</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo">🚀</div>
        <div class="header-titles">
          <span class="app-name">GramAlert</span>
          <span class="page-title" id="page-title">Dashboard</span>
        </div>
      </div>
      <div class="header-right">
        <div class="wallet-indicator" id="wallet-indicator" title="Wallet Status">
          <span class="dot disconnected"></span>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-content" id="app-content">
      <div class="loading-screen">
        <div class="spinner"></div>
        <p>Loading GramAlert...</p>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-item active" data-page="dashboard">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-page="price">
        <span class="nav-icon">📈</span>
        <span class="nav-label">Price</span>
      </button>
      <button class="nav-item" data-page="portfolio">
        <span class="nav-icon">💼</span>
        <span class="nav-label">Portfolio</span>
      </button>
      <button class="nav-item" data-page="wallet">
        <span class="nav-icon">👛</span>
        <span class="nav-label">Wallet</span>
      </button>
      <button class="nav-item" data-page="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>

    <!-- More Menu Overlay -->
    <div class="more-menu-overlay" id="more-menu-overlay">
      <div class="more-menu">
        <div class="more-menu-header">
          <h3>All Features</h3>
          <button class="close-more" onclick="App.closeMoreMenu()">✕</button>
        </div>
        <div class="more-menu-grid" id="more-menu-grid"></div>
      </div>
    </div>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/i18n.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/wallet.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
